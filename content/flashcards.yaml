cards:
  # ── Formelkort: front = klart spørsmål, back = formel (+ kort symbolforklaring) ──
  - front: "Fotonets energi uttrykt ved frekvens og ved bølgelengde?"
    back: "$E=hf=\\dfrac{hc}{\\lambda}$ — $h$ = Plancks konstant."
    section: "Foton & radiometri"
  - front: "Fotonets impuls uttrykt ved energien og ved bølgelengden?"
    back: "$p=\\dfrac{E}{c}=\\dfrac{h}{\\lambda}$"
    section: "Foton & radiometri"
  - front: "Sammenhengen mellom bølgelengde, frekvens og fart for lys i vakuum?"
    back: "$\\lambda f = c$, og $v=\\dfrac{pc^2}{E}=c$"
    section: "Foton & radiometri"
  - front: "Hvordan defineres romvinkelen $\\Omega$ (i steradianer)?"
    back: "$\\Omega = \\dfrac{A}{r^2}$ — en hel kule spenner $4\\pi\\,\\text{sr}$."
    section: "Foton & radiometri"
  - front: "Snells brytningslov ved en grenseflate?"
    back: "$n_i\\sin\\theta_i=n_t\\sin\\theta_t$ — vinkler måles fra normalen."
    section: "Geometrisk optikk: Snell & linser"
  - front: "Tynnlinse-/avbildningslikningen (objekt-, bilde- og brennvidde)?"
    back: "$\\dfrac{1}{s_o}+\\dfrac{1}{s_i}=\\dfrac{1}{f}$"
    section: "Geometrisk optikk: Snell & linser"
  - front: "Lateral forstørrelse $m$ uttrykt ved bilde- og objektavstand?"
    back: "$m=-\\dfrac{s_i}{s_o}$ — $m<0$ betyr invertert."
    section: "Geometrisk optikk: Snell & linser"
  - front: "Linsemakerformelen for en tynn linse ($n_2$ i medium $n_1$)?"
    back: "$\\dfrac{1}{f}=\\dfrac{n_2-n_1}{n_1}\\!\\left(\\dfrac{1}{R_1}-\\dfrac{1}{R_2}\\right)$"
    section: "Geometrisk optikk: Snell & linser"
  - front: "Brennvidden til et sfærisk speil med krumningsradius $R$?"
    back: "$f=\\mp\\dfrac{R}{2}$ — konkavt (samlende) gir $f>0$."
    section: "Geometrisk optikk: Snell & linser"
  - front: "Stråle-transfer-matrise for fri propagasjon (translasjon) over avstand $d$?"
    back: "$T(d)=\\begin{pmatrix}1 & d \\\\ 0 & 1\\end{pmatrix}$"
    section: "Stråle-transfer-matriser"
  - front: "Stråle-transfer-matrise for en tynn linse med brennvidde $f$?"
    back: "$L(f)=\\begin{pmatrix}1 & 0 \\\\ -1/f & 1\\end{pmatrix}$"
    section: "Stråle-transfer-matriser"
  - front: "Stråle-transfer-matrise for brytning i en plan flate ($n_1\\to n_2$)?"
    back: "$R_P=\\begin{pmatrix}1 & 0 \\\\ 0 & n_1/n_2\\end{pmatrix}$"
    section: "Stråle-transfer-matriser"
  - front: "Stråle-transfer-matrise for brytning i en sfærisk flate (radius $R$)?"
    back: "$R_S=\\begin{pmatrix}1 & 0 \\\\ \\frac{n_1-n_2}{n_2 R} & n_1/n_2\\end{pmatrix}$"
    section: "Stråle-transfer-matriser"
  - front: "Stråle-transfer-matrise for et sfærisk speil ($f=R/2$)?"
    back: "$M_\\text{speil}=\\begin{pmatrix}1 & 0 \\\\ -2/R & 1\\end{pmatrix}$ — står ikke på arket."
    section: "Stråle-transfer-matriser"
  - front: "Vinkelforstørrelsen til en enkel lupe (bilde i uendelig)?"
    back: "$MP_\\text{lupe}=\\dfrac{25\\text{ cm}}{f}$ — 25 cm = øyets nærpunkt."
    section: "Optiske instrumenter"
  - front: "Forstørrelsen til et sammensatt mikroskop (tubuslengde $L$)?"
    back: "$M_\\text{mik}=-\\dfrac{L}{f_o}\\cdot\\dfrac{25}{f_e}$ — $f_o$ objektiv, $f_e$ okular."
    section: "Optiske instrumenter"
  - front: "Vinkelforstørrelsen til et teleskop (refraktor)?"
    back: "$MP_\\text{tel}=-\\dfrac{f_o}{f_e}$"
    section: "Optiske instrumenter"
  - front: "Hvordan defineres f-tallet (f-number)?"
    back: "$f\\#=\\dfrac{f}{D}$ — brennvidde delt på aperturdiameter."
    section: "Optiske instrumenter"
  - front: "Bølgelikningen for det elektriske feltet i et medium?"
    back: "$\\nabla^2\\vec E=\\dfrac{n^2}{c^2}\\dfrac{\\partial^2\\vec E}{\\partial t^2}$"
    section: "Maxwell & EM-bølger"
  - front: "Plan-bølge-løsningen for $\\vec E$ (og betingelsen på $\\omega$)?"
    back: "$\\vec E=\\vec E_0\\cos(\\vec k\\cdot\\vec r-\\omega t)$, med $\\omega=kv,\\ k=2\\pi/\\lambda$."
    section: "Maxwell & EM-bølger"
  - front: "Forholdet mellom $E$- og $B$-feltamplituden i en EM-bølge?"
    back: "$B_0=E_0/v$ (i vakuum $B_0=E_0/c$)."
    section: "Maxwell & EM-bølger"
  - front: "Poynting-vektoren (momentan energifluks)?"
    back: "$\\vec S=c^2\\varepsilon_0(\\vec E\\times\\vec B)$"
    section: "Maxwell & EM-bølger"
  - front: "Tidsmidlet intensitet uttrykt ved feltamplituden $E_0$?"
    back: "$I=\\langle S\\rangle=\\tfrac12 c\\,n\\,\\varepsilon_0 E_0^2$"
    section: "Maxwell & EM-bølger"
  - front: "Fresnels refleksjonskoeffisient for TE (s-pol), med $n=n_2/n_1$?"
    back: "$r_{TE}=\\dfrac{\\cos\\theta-\\sqrt{n^2-\\sin^2\\theta}}{\\cos\\theta+\\sqrt{n^2-\\sin^2\\theta}}$"
    section: "Fresnel, Brewster & polarisering"
  - front: "Fresnels refleksjonskoeffisient for TM (p-pol)?"
    back: "$r_{TM}=\\dfrac{-n^2\\cos\\theta+\\sqrt{n^2-\\sin^2\\theta}}{n^2\\cos\\theta+\\sqrt{n^2-\\sin^2\\theta}}$"
    section: "Fresnel, Brewster & polarisering"
  - front: "Energi-reflektans og -transmittans, og energibevaringen?"
    back: "$R=r^2,\\quad T=n\\dfrac{\\cos\\theta_t}{\\cos\\theta}\\,t^2$, og $R+T=1$."
    section: "Fresnel, Brewster & polarisering"
  - front: "Brewster-vinkelen (der reflektert lys blir lineært polarisert)?"
    back: "$\\theta_p=\\arctan\\!\\dfrac{n_2}{n_1}$"
    section: "Fresnel, Brewster & polarisering"
  - front: "Kritisk vinkel for total intern refleksjon (tett→tynt, $n_1>n_2$)?"
    back: "$\\sin\\theta_c=\\dfrac{n_2}{n_1}$"
    section: "Total intern refleksjon & evanescente bølger"
  - front: "Hva er $|r|$ ved total intern refleksjon ($\\theta>\\theta_c$)?"
    back: "$|r|=1$ — full refleksjon, men med faseforskyvning."
    section: "Total intern refleksjon & evanescente bølger"
  - front: "Hvordan avtar den evanescente bølgen inn i det tynne mediet?"
    back: "$E(z)\\propto e^{-z/d}$ — $d$ = inntrengningsdybde ($\\sim\\lambda$)."
    section: "Total intern refleksjon & evanescente bølger"
  - front: "Omtrentlig synsvinkel for primær- og sekundærregnbuen?"
    back: "$\\theta_\\text{regn}\\approx 42^\\circ$ (1°), $51^\\circ$ (2°)"
    section: "Total intern refleksjon & evanescente bølger"
  - front: "Resulterende amplitude av to bølger (fasoraddisjon)?"
    back: "$E_0^2=E_{01}^2+E_{02}^2+2E_{01}E_{02}\\cos(\\alpha_2-\\alpha_1)$ — kryssleddet er interferensen."
    section: "Superposisjon & Youngs dobbeltspalt"
  - front: "Youngs intensitetsmønster fra dobbeltspalt (avstand $a$)?"
    back: "$I_\\text{tot}=4I_0\\cos^2\\!\\big(\\tfrac{\\pi a\\sin\\theta}{\\lambda}\\big)$"
    section: "Superposisjon & Youngs dobbeltspalt"
  - front: "Stripeavstanden på skjermen i et Young-oppsett?"
    back: "$\\Delta y=\\dfrac{\\lambda L}{a}$ — $L$ = skjermavstand, $a$ = spalteavstand."
    section: "Superposisjon & Youngs dobbeltspalt"
  - front: "Antall striper mønsteret forskyves av en glassplate over én spalt?"
    back: "$N=\\dfrac{(n-1)t}{\\lambda}$ — $t$ = platetykkelse."
    section: "Superposisjon & Youngs dobbeltspalt"
  - front: "Temporal koherenslengde uttrykt ved spektralbredden?"
    back: "$l_c=\\dfrac{\\lambda_0^2}{\\Delta\\lambda}=\\dfrac{c}{\\Delta f}$"
    section: "Koherens, Michelson & tynne filmer"
  - front: "Spatial koherenslengde for en kilde med vinkelutstrekning $\\theta$?"
    back: "$l_s<\\dfrac{1{,}22\\lambda}{\\theta}$"
    section: "Koherens, Michelson & tynne filmer"
  - front: "Michelson-interferometer: intensitet og veiforskjell?"
    back: "$I=4I_0\\cos^2(\\delta/2)$, $\\Delta p=2d\\cos\\theta$ — $d$ = speilforskyvning."
    section: "Koherens, Michelson & tynne filmer"
  - front: "Hvordan defineres synligheten (visibility) $V$?"
    back: "$V=\\dfrac{I_\\text{max}-I_\\text{min}}{I_\\text{max}+I_\\text{min}}$"
    section: "Koherens, Michelson & tynne filmer"
  - front: "Optisk veiforskjell i en tynn film (tykkelse $t$, indeks $n_f$)?"
    back: "$\\Delta=2n_f t\\cos\\theta_t$ — pluss evt. $\\lambda/2$ fra refleksjon."
    section: "Koherens, Michelson & tynne filmer"
  - front: "Kritisk vinkel ved kjerne–kappe-grensen ($\\phi_c$ fra grenseflaten)?"
    back: "$\\sin\\phi_c=\\dfrac{n_2}{n_1}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Numerisk apertur uttrykt ved kjerne- og kappeindeks?"
    back: "$NA=n_0\\sin\\theta_\\text{max}=\\sqrt{n_1^2-n_2^2}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Skip-avstanden mellom to refleksjoner i en fiber ($d$ = kjernediameter)?"
    back: "$L_s=\\dfrac{d}{\\tan\\theta'}=d\\sqrt{\\left(\\dfrac{n_1}{n_0\\sin\\theta}\\right)^2-1}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Høyeste modetall i en fiber (slab-tilnærming)?"
    back: "$m_{x,\\text{max}}\\cong\\dfrac{2d}{\\lambda}\\,NA$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Totalt antall moder i en sylindrisk multimodus-fiber?"
    back: "$N_\\text{moder}\\approx 4\\left(\\dfrac{d\\,NA}{\\lambda}\\right)^2$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Betingelsen på kjernediameteren for singelmodus-drift?"
    back: "$d<\\dfrac{2{,}4\\,\\lambda}{\\pi\\,NA}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Beers lov for dempning, og dempningskoeffisienten $\\alpha$?"
    back: "$I_L=I_0e^{-\\alpha L}$, $\\alpha=\\dfrac{1}{L}\\ln\\dfrac{I_0}{I_L}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Dempning i dB/km uttrykt ved inn- og uteffekt?"
    back: "$\\alpha_\\text{dB}=10\\log_{10}\\dfrac{P_\\text{inn}}{P_\\text{ut}}=\\dfrac{10}{\\ln 10}\\,\\alpha$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Modal dispersjon (pulsutsmøring per lengde) i en step-index-fiber?"
    back: "$\\left(\\dfrac{\\delta\\tau}{L}\\right)_\\text{step}=\\dfrac{n_1}{c}\\dfrac{n_1-n_2}{n_2}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Modal dispersjon i en parabolisk GRIN-fiber?"
    back: "$\\left(\\dfrac{\\delta\\tau}{L}\\right)_\\text{GRIN}\\approx\\dfrac{n_1}{2c}\\Delta_n^{2}$, med $\\Delta_n\\approx\\tfrac{n_1-n_2}{n_1}$."
    section: "Optiske fibre & kommunikasjon"
  - front: "Materialdispersjon uttrykt ved kildens spektralbredde $\\Delta\\lambda$?"
    back: "$\\dfrac{\\delta\\tau}{L}=-M\\,\\Delta\\lambda$ — $M$ i ps/(nm·km)."
    section: "Optiske fibre & kommunikasjon"
  - front: "Båndbredde–avstand-produktet uttrykt ved pulsutsmøringen?"
    back: "$\\nu_\\text{max}L=\\dfrac{0{,}5}{(\\delta\\tau/L)}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Hvilken bølgelengde reflekterer et fiber-Bragg-gitter (periode $\\Lambda$)?"
    back: "$\\lambda_B=2n_1\\Lambda$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Mach–Zehnder demux: veiforskjellen som skiller to bølgelengder?"
    back: "$\\Delta L=\\dfrac{m\\lambda_1}{n}=\\dfrac{(m+\\tfrac12)\\lambda_2}{n}$ (begge må gjelde)."
    section: "Optiske fibre & kommunikasjon"
  - front: "Spatial oppløsning til en fiberbunt (linjer/mm)?"
    back: "$\\mathcal R\\approx\\dfrac{500}{d\\,[\\mu\\text{m}]}$"
    section: "Optiske fibre & kommunikasjon"
  - front: "Enkeltspalt-intensiteten, med $\\beta$ definert?"
    back: "$I=I_0\\left(\\dfrac{\\sin\\beta}{\\beta}\\right)^2,\\ \\beta=\\dfrac{\\pi b\\sin\\theta}{\\lambda}$ — $b$ = spaltbredde."
    section: "Fraunhofer-diffraksjon & oppløsning"
  - front: "Hvor ligger minima for enkeltspalt-diffraksjon?"
    back: "$b\\sin\\theta_m=m\\lambda$"
    section: "Fraunhofer-diffraksjon & oppløsning"
  - front: "Airy-skive / Rayleigh-kriteriet (sirkulær apertur, diameter $D$)?"
    back: "$\\Delta\\theta_{1/2}=\\dfrac{1{,}22\\lambda}{D}\\approx\\dfrac{\\Delta x}{L}$"
    section: "Fraunhofer-diffraksjon & oppløsning"
  - front: "Betingelsen for at Fraunhofer (fjernfelt) gjelder?"
    back: "$L\\gg\\dfrac{b^2}{\\lambda}$"
    section: "Fraunhofer-diffraksjon & oppløsning"
  - front: "Flerspalt-intensiteten ($N$ spalter, bredde $b$, avstand $a$)?"
    back: "$I=I_0\\big(\\tfrac{\\sin\\beta}{\\beta}\\big)^2\\big(\\tfrac{\\sin N\\alpha}{\\sin\\alpha}\\big)^2$"
    section: "Fourier-optikk & gitteret"
  - front: "Gitterlikningen for hovedmaksima (innfallsvinkel $\\theta_i$)?"
    back: "$m\\lambda=a(\\sin\\theta_i+\\sin\\theta_m)$ — $a$ = gitterkonstant."
    section: "Fourier-optikk & gitteret"
  - front: "Et gitters spektrale oppløsning $\\mathcal R$?"
    back: "$\\mathcal R=\\dfrac{\\lambda}{\\Delta\\lambda}=mN$ — $N$ = antall belyste spalter."
    section: "Fourier-optikk & gitteret"
  - front: "Et gitters vinkeldispersjon $\\mathcal D$?"
    back: "$\\mathcal D=\\dfrac{d\\theta_m}{d\\lambda}=\\dfrac{m}{a\\cos\\theta_m}$"
    section: "Fourier-optikk & gitteret"
  - front: "Fritt spektralområde for et gitter i orden $m$?"
    back: "$\\lambda_\\text{fsr}=\\dfrac{\\lambda_1}{m}$"
    section: "Fourier-optikk & gitteret"

  # ── Eksamensfeller: front = klart spørsmål, back = riktig svar + forklaring ──
  - front: "Hvilken egenskap blir feilaktig tillagt fotonet (klassisk MC-felle)?"
    back: "<strong>At det adlyder Fermi–Dirac-statistikk.</strong> Fotoner er bosoner og adlyder Bose–Einstein; Fermi–Dirac gjelder fermioner (f.eks. elektroner)."
    section: "Eksamensfeller"
  - front: "Hva skjer med foton-energien når bølgelengden dobles?"
    back: "<strong>Den halveres.</strong> $E=hc/\\lambda$ — energi er omvendt proporsjonal med bølgelengde."
    section: "Eksamensfeller"
  - front: "Lik effekt ved 400 nm og 800 nm — hvilken stråle har flest fotoner per sekund?"
    back: "<strong>800 nm.</strong> Lengre bølgelengde ⇒ mindre energi per foton, så flere fotoner per sekund ved samme effekt."
    section: "Eksamensfeller"
  - front: "Hvilken enhet måles irradians i?"
    back: "<strong>W/m².</strong> Irradians er strålingseffekt per areal på en flate."
    section: "Eksamensfeller"
  - front: "Hvor og hvordan avbildes et objekt som står $2f$ foran en positiv linse?"
    back: "<strong>Reelt, invertert og like stort ($m=-1$) ved $2f$.</strong> $s_o=2f$ gir $s_i=2f$."
    section: "Eksamensfeller"
  - front: "For en positiv linse i luft, hvilket fortegnsett gir en gyldig form?"
    back: "<strong>$R_1>0,\\ R_2<0$ (bikonveks).</strong> Da blir $(1/R_1-1/R_2)>0$ og $f>0$."
    section: "Eksamensfeller"
  - front: "Hva betyr et positivt $s_i$ i tynnlinseformelen?"
    back: "<strong>Reelt bilde på bildesiden.</strong> Med standard fortegn ligger et positivt bildepunkt på utgangssiden av linsen."
    section: "Eksamensfeller"
  - front: "Hvor dannes bildet når $s_o=f$ for en positiv linse?"
    back: "<strong>I uendelig.</strong> $1/s_i=1/f-1/f=0$, altså $s_i\\to\\infty$."
    section: "Eksamensfeller"
  - front: "Hva betyr $B=0$ i en systemmatrise?"
    back: "<strong>Inn- og utplan er objekt/bilde-konjugerte.</strong> Utgangshøyden er uavhengig av inngangsvinkel, og da er $A=m$."
    section: "Eksamensfeller"
  - front: "Lyset møter element 1, så 2, så 3 — hvordan skrives systemmatrisen?"
    back: "<strong>$M_3M_2M_1$.</strong> Det siste elementet lyset møter står lengst til venstre."
    section: "Eksamensfeller"
  - front: "Hva er den raske kontrollen for et system som starter og slutter i samme medium?"
    back: "<strong>$\\det M=1$.</strong> For tapsfri paraksial stråleoptikk i samme medium er determinanten 1."
    section: "Eksamensfeller"
  - front: "Hva kjennetegner et afokalt system i systemmatrisen?"
    back: "<strong>$C=0$.</strong> Parallelle inngående stråler forblir parallelle ut."
    section: "Eksamensfeller"
  - front: "Hvordan leser du av et systems effektive brennvidde fra matrisen?"
    back: "<strong>$f=-1/C$.</strong> Kardinalpunkt-formlene bygger på dette."
    section: "Eksamensfeller"
  - front: "Hvilken byggematrise står IKKE på formelarket?"
    back: "<strong>Sfærisk speil.</strong> Speilmatrisen $\\begin{pmatrix}1&0\\\\-2/R&1\\end{pmatrix}$ må du huske; arket gir bare $f=\\mp R/2$."
    section: "Eksamensfeller"
  - front: "Hvorfor er bakre brennavstand (BFD) mindre enn effektiv brennvidde når $A<1$?"
    back: "<strong>Hovedplanet ligger foran utgangsplanet.</strong> Avstanden fra glasset (BFD) blir kortere enn $f$ målt fra hovedplanet."
    section: "Eksamensfeller"
  - front: "Hvor avbildes et fjernt objekt alltid?"
    back: "<strong>I brennplanet.</strong> Parallelle stråler fra uendelig samles i det bakre brennplanet."
    section: "Eksamensfeller"
  - front: "To positive linser i avstand $f_1+f_2$ («mikroskop») — bildetype og forstørrelse?"
    back: "<strong>Reelt og invertert, $h_i/h_o=f_2/f_1$.</strong> Afokal oppstilling med objekt nær $f_1$."
    section: "Eksamensfeller"
  - front: "Teleskop med $f_o=100$ cm, $f_e=2$ cm — omtrentlig vinkelforstørrelse?"
    back: "<strong>×50.</strong> $MP=-f_o/f_e=-50$ (invertert)."
    section: "Eksamensfeller"
  - front: "Hvorfor er et Kepler-teleskop afokalt når linseavstanden er $f_o+f_e$?"
    back: "<strong>Felles brennplan deles.</strong> Objektivets bildeplan faller sammen med okularets fremre brennplan."
    section: "Eksamensfeller"
  - front: "Hva betyr et større f-tall i et kamera (for aperturen)?"
    back: "<strong>Mindre apertur.</strong> $f\\#=f/D$ — for gitt $f$ gir større f-tall mindre $D$."
    section: "Eksamensfeller"
  - front: "Plan EM-bølge: $\\vec E\\parallel\\hat x$, utbredelse $+\\hat z$ — langs hvilken akse ligger $\\vec B$?"
    back: "<strong>$\\hat y$.</strong> $\\vec E\\times\\vec B$ må peke langs $+\\hat z$, og $\\hat x\\times\\hat y=\\hat z$."
    section: "Eksamensfeller"
  - front: "Hva er lysets fart i et medium med $n=1{,}5$?"
    back: "<strong>$c/1{,}5\\approx 2{,}0\\times10^8$ m/s.</strong> $v=c/n$."
    section: "Eksamensfeller"
  - front: "Med hvilken faktor endres intensiteten om feltamplituden $E_0$ dobles?"
    back: "<strong>Faktor 4.</strong> Intensitet er proporsjonal med $E_0^2$."
    section: "Eksamensfeller"
  - front: "Hvilken retning beveger bølgen $\\cos(kz-\\omega t)$ seg?"
    back: "<strong>Langs $+z$.</strong> Konstant fase $kz-\\omega t$ krever at $z$ øker når $t$ øker."
    section: "Eksamensfeller"
  - front: "Uppolarisert lys treffer glass ved Brewster-vinkelen — polarisering på det reflekterte lyset?"
    back: "<strong>Fullstendig lineært polarisert.</strong> Ved Brewster er $r_{TM}=0$, så bare TE reflekteres."
    section: "Eksamensfeller"
  - front: "Omtrentlig reflektans ved normal innfall luft→glass ($n=1{,}5$)?"
    back: "<strong>≈ 4 %.</strong> $R=((1-1{,}5)/(1+1{,}5))^2=0{,}04$."
    section: "Eksamensfeller"
  - front: "Hvilken komponent er null i refleksjon ved Brewster-vinkelen (luft→glass)?"
    back: "<strong>TM.</strong> Brewster-betingelsen er $r_{TM}=0$."
    section: "Eksamensfeller"
  - front: "Hva bestemmer innfallsplanet?"
    back: "<strong>Innkommende stråle og normalen.</strong> Det er planet som inneholder stråleretningen og flatenormalen."
    section: "Eksamensfeller"
  - front: "Hvilken retning og betingelse kreves for total intern refleksjon?"
    back: "<strong>Fra tett til tynt medium, over kritisk vinkel.</strong> TIR krever $n_1>n_2$ og $\\theta>\\theta_c$."
    section: "Eksamensfeller"
  - front: "Hvilken vinkel sees primærregnbuen i omtrent?"
    back: "<strong>≈ 42°.</strong> Minimum avbøyning for én indre refleksjon (rødt ytterst)."
    section: "Eksamensfeller"
  - front: "Hva skjer med reflektansen over kritisk vinkel?"
    back: "<strong>Den blir 1.</strong> Ved TIR er $|r|=1$, så all effekt reflekteres."
    section: "Eksamensfeller"
  - front: "Hvordan varierer det evanescente feltet inn i det tynne mediet?"
    back: "<strong>Det avtar eksponentielt.</strong> $E\\propto e^{-z/d}$ bort fra grenseflaten."
    section: "Eksamensfeller"
  - front: "Hva skjer med stripeavstanden om du dobler spaltavstanden $a$ i et Young-oppsett?"
    back: "<strong>Den halveres.</strong> $\\Delta y=\\lambda L/a$ — omvendt proporsjonal med $a$."
    section: "Eksamensfeller"
  - front: "Hvilken intensitet gir to like sterke koherente bølger i motfase ($\\Delta\\alpha=\\pi$)?"
    back: "<strong>0.</strong> $\\cos\\pi=-1$ ⇒ $E_0^2+E_0^2-2E_0^2=0$ (destruktiv)."
    section: "Eksamensfeller"
  - front: "Hva gir en veiforskjell på $\\lambda/2$ for to like sterke stråler?"
    back: "<strong>Minimum (destruktiv).</strong> $\\lambda/2$ tilsvarer faseforskjell $\\pi$."
    section: "Eksamensfeller"
  - front: "Hvor mye øker en glassplate (tykkelse $t$, indeks $n$) den optiske veilengden?"
    back: "<strong>$(n-1)t$.</strong> Luftveien $t$ erstattes av glassveien $nt$."
    section: "Eksamensfeller"
  - front: "Hvordan påvirker en smalere spektralbredde $\\Delta\\lambda$ koherenslengden?"
    back: "<strong>Lengre koherenslengde.</strong> $l_c=\\lambda_0^2/\\Delta\\lambda$ — mindre $\\Delta\\lambda$ ⇒ lengre $l_c$."
    section: "Eksamensfeller"
  - front: "Hva gir høy speilrefleksjon ($r=0{,}9$) i et Fabry–Perot?"
    back: "<strong>Høy oppløsning, skarpe striper.</strong> Mange runder ⇒ smale striper ⇒ høy spektral oppløsning."
    section: "Eksamensfeller"
  - front: "Hvorfor brukes faktoren 2 i Michelson når ett speil flyttes?"
    back: "<strong>Fram- og tilbakevei.</strong> Armens optiske vei endres med dobbelt speilforskyvningen."
    section: "Eksamensfeller"
  - front: "Hva betyr lav synlighet $V$?"
    back: "<strong>Liten forskjell mellom maks og min.</strong> $V=(I_\\text{max}-I_\\text{min})/(I_\\text{max}+I_\\text{min})$ måler kontrast."
    section: "Eksamensfeller"
  - front: "Hvilken mekanisme fører lys i en optisk fiber?"
    back: "<strong>Total intern refleksjon i kjerne–kappe.</strong> Kjernen har høyere indeks enn kappen, så TIR holder lyset inne for $\\phi>\\phi_c$."
    section: "Eksamensfeller"
  - front: "Hvorfor har singelmodus-fiber høyere båndbredde — hva fjernes?"
    back: "<strong>Modal dispersjon.</strong> Med kun én mode forsvinner forskjellen i gangtid mellom moder."
    section: "Eksamensfeller"
  - front: "Ved hvilken bølgelengde ligger minimum dempning i en silikafiber?"
    back: "<strong>≈ 1,55 µm.</strong> Rayleigh-spredning ($\\propto1/\\lambda^4$) og IR-absorpsjon møtes der (3. telekomvindu)."
    section: "Eksamensfeller"
  - front: "Hvordan avtar Rayleigh-spredning med bølgelengde?"
    back: "<strong>Som $1/\\lambda^4$.</strong> Derfor velges lange bølgelengder i fiber."
    section: "Eksamensfeller"
  - front: "Hva brukes en EDFA til?"
    back: "<strong>Å forsterke signalet optisk (stimulert emisjon).</strong> Erbium-dopet fiber pumpet ved ~980 nm forsterker C-båndet uten OEO-konvertering."
    section: "Eksamensfeller"
  - front: "Hva virker et fiber-Bragg-gitter som?"
    back: "<strong>Et bølgelengdespesifikt speil ($\\lambda_B=2n_1\\Lambda$).</strong> Periodisk indeksmodulasjon gir sterk refleksjon ved Bragg-betingelsen."
    section: "Eksamensfeller"
  - front: "Hvorfor reduserer en parabolsk GRIN-fiber modal dispersjon?"
    back: "<strong>Skrå stråler går lengre, men i lavere indeks ⇒ nesten lik gangtid.</strong> Banene blir nær isokrone."
    section: "Eksamensfeller"
  - front: "Hva forteller båndbredde–avstand-produktet $\\nu_\\text{max}L$?"
    back: "<strong>Maks bitrate ganger lengde fiberen tåler.</strong> $\\nu_\\text{max}L=0{,}5/(\\delta\\tau/L)$."
    section: "Eksamensfeller"
  - front: "Hva øker diameteren på Airy-skiven?"
    back: "<strong>Større $\\lambda$, mindre apertur $D$ og større avstand $L$ — alle tre.</strong> $\\Delta x\\approx 1{,}22\\lambda L/D$."
    section: "Eksamensfeller"
  - front: "Hvor mye brer en 0,5 mm bred stråle (546 nm) seg over 10 m?"
    back: "<strong>≈ 22 mm.</strong> Spredning $\\approx 2\\lambda L/b\\approx 0{,}022$ m."
    section: "Eksamensfeller"
  - front: "Når kommer første minimum for enkeltspalt-diffraksjon?"
    back: "<strong>$b\\sin\\theta=\\lambda$.</strong> Minima er $b\\sin\\theta=m\\lambda$, første for $m=1$."
    section: "Eksamensfeller"
  - front: "Hva skjer med Airy-vinkelen om aperturdiameteren dobles?"
    back: "<strong>Den halveres.</strong> $\\Delta\\theta=1{,}22\\lambda/D$ — omvendt proporsjonal med $D$."
    section: "Eksamensfeller"
  - front: "Gitter med $N=5000$ spalter brukt i 2. orden — spektral oppløsning $\\mathcal R$?"
    back: "<strong>10000.</strong> $\\mathcal R=mN=2\\times5000$."
    section: "Eksamensfeller"
  - front: "Hvor mange minima ligger mellom to nabo-hovedmaksima fra et $N$-spaltgitter?"
    back: "<strong>$N-1$ minima.</strong> $(\\sin N\\alpha/\\sin\\alpha)^2$ har $N-1$ nullpunkter og $N-2$ sekundærmaksima."
    section: "Eksamensfeller"
  - front: "Hva øker et gitters spektrale oppløsning?"
    back: "<strong>Høyere orden eller flere belyste spalter.</strong> $\\mathcal R=mN$."
    section: "Eksamensfeller"
  - front: "Hvorfor kan gitterordener overlappe?"
    back: "<strong>Samme vinkel kan tilfredsstille likningen for ulike $m$ og $\\lambda$.</strong> Gitterlikningen inneholder produktet $m\\lambda$."
    section: "Eksamensfeller"
