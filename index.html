<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFY4195 Optikk — Interaktiv pensumguide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spectral:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
:root{
  --bg:#0a0e14;
  --bg2:#0f141d;
  --panel:#141b26;
  --panel2:#1a2330;
  --ink:#e8e6df;
  --ink-dim:#a7adb8;
  --ink-faint:#6b7480;
  --line:#26303d;
  --line2:#33404f;
  --violet:#8b6cf0;
  --indigo:#5b7cf0;
  --cyan:#3fd4d0;
  --green:#5fd08a;
  --yellow:#f0d050;
  --orange:#f0964e;
  --red:#ef6a6a;
  --accent:var(--cyan);
  --spectrum:linear-gradient(90deg,#8b3df0,#5b7cf0,#3fd4d0,#5fd08a,#f0d050,#f0964e,#ef6a6a);
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:'Spectral',Georgia,serif;font-weight:400;font-size:17px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 88% -8%,rgba(91,124,240,.10),transparent 60%),radial-gradient(800px 460px at 6% 8%,rgba(63,212,208,.07),transparent 60%);
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.12;letter-spacing:-.01em}
code,.mono,.num{font-family:'IBM Plex Mono',monospace}

/* ====== top bar ====== */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,14,20,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 22px}
.brand{display:flex;align-items:center;gap:12px;font-family:'Fraunces';font-weight:600;font-size:18px;letter-spacing:-.01em;white-space:nowrap}
.prism{width:30px;height:30px;flex:none;border-radius:7px;background:var(--spectrum);box-shadow:0 0 18px -2px rgba(91,124,240,.6);position:relative;overflow:hidden}
.prism::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.45),transparent 40%)}
.brand small{font-family:'IBM Plex Mono';font-weight:400;font-size:11px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;display:block;margin-top:-2px}
.topbar .spacer{flex:1}
.progresswrap{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-dim)}
.progressbar{width:130px;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.progressfill{height:100%;width:0;background:var(--spectrum);transition:width .4s ease}
.btn-reset{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);background:transparent;border:1px solid var(--line2);border-radius:6px;padding:5px 9px;cursor:pointer;transition:.2s}
.btn-reset:hover{color:var(--ink);border-color:var(--accent)}
.menu-toggle{display:none;background:transparent;border:1px solid var(--line2);color:var(--ink);border-radius:7px;padding:7px 10px;cursor:pointer;font-size:18px}

/* ====== layout ====== */
.layout{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:264px 1fr;gap:38px;padding:30px 22px 90px}
.sidebar{position:sticky;top:78px;height:calc(100vh - 100px);overflow-y:auto;padding-right:8px;scrollbar-width:thin}
.sidebar::-webkit-scrollbar{width:7px}.sidebar::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.nav-section{font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-faint);margin:22px 0 8px;padding-left:4px}
.nav-section:first-child{margin-top:0}
.nav-link{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;color:var(--ink-dim);text-decoration:none;font-size:15px;font-family:'Spectral';transition:.16s;border:1px solid transparent;cursor:pointer}
.nav-link:hover{background:var(--panel);color:var(--ink)}
.nav-link.active{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
.nav-num{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);width:26px;flex:none}
.nav-link.active .nav-num{color:var(--accent)}
.nav-check{margin-left:auto;width:16px;height:16px;border-radius:5px;border:1.5px solid var(--line2);flex:none;display:grid;place-items:center;font-size:10px;color:transparent;transition:.2s}
.nav-link.done .nav-check{background:var(--green);border-color:var(--green);color:#0a0e14}

.content{min-width:0}

/* ====== hero ====== */
.hero{border:1px solid var(--line);border-radius:20px;background:linear-gradient(160deg,var(--panel),var(--bg2));padding:42px 40px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.hero::before{content:"";position:absolute;top:-40%;right:-10%;width:520px;height:520px;background:conic-gradient(from 200deg,transparent,rgba(139,108,240,.16),rgba(63,212,208,.13),transparent);filter:blur(34px)}
.hero-tag{position:relative;font-family:'IBM Plex Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.hero h1{position:relative;font-size:clamp(34px,5vw,56px);margin:0 0 16px;font-weight:600}
.hero h1 .grad{background:var(--spectrum);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{position:relative;font-size:18px;color:var(--ink-dim);max-width:680px;margin:0 0 24px}
.hero-stats{position:relative;display:flex;flex-wrap:wrap;gap:14px}
.stat{border:1px solid var(--line2);border-radius:12px;padding:12px 18px;background:rgba(0,0,0,.18)}
.stat b{font-family:'Fraunces';font-size:24px;display:block}
.stat span{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em}

/* ====== module sections ====== */
.module{margin-top:54px;scroll-margin-top:80px}
.mod-head{display:flex;align-items:flex-start;gap:18px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
.mod-index{font-family:'Fraunces';font-size:42px;font-weight:600;line-height:1;color:var(--line2);flex:none;min-width:58px}
.mod-head .meta{flex:1}
.mod-kicker{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.mod-head h2{font-size:clamp(24px,3.4vw,34px);margin:0 0 8px}
.mod-head .week{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint)}
.done-btn{flex:none;font-family:'IBM Plex Mono';font-size:12px;border:1px solid var(--line2);background:transparent;color:var(--ink-dim);border-radius:9px;padding:9px 14px;cursor:pointer;transition:.2s;white-space:nowrap}
.done-btn:hover{border-color:var(--green);color:var(--ink)}
.done-btn.done{background:var(--green);color:#0a0e14;border-color:var(--green);font-weight:600}

.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-bottom:20px}
.card h3{font-size:21px;margin:0 0 14px;display:flex;align-items:center;gap:10px}
.card h3 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 10px var(--accent)}
.card h4{font-size:16.5px;margin:20px 0 8px;color:var(--ink)}
.card p{margin:0 0 13px;color:var(--ink-dim)}
.card p strong,.card li strong{color:var(--ink);font-weight:600}
.card ul,.card ol{margin:0 0 13px;padding-left:22px;color:var(--ink-dim)}
.card li{margin-bottom:7px}
.lede{font-size:18.5px;color:var(--ink)!important;border-left:3px solid var(--accent);padding-left:16px;margin-bottom:20px!important}

/* learning goals */
.goals{background:linear-gradient(135deg,rgba(63,212,208,.07),rgba(91,124,240,.05));border:1px solid var(--line2)}
.goals h3 .dot{background:var(--violet);box-shadow:0 0 10px var(--violet)}
.goals ul{list-style:none;padding-left:0}
.goals li{position:relative;padding-left:26px}
.goals li::before{content:"◆";position:absolute;left:0;color:var(--violet);font-size:11px;top:4px}

/* formula box */
.formula-box{background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:6px 18px 4px;margin:14px 0}
.formula-row{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px dashed var(--line)}
.formula-row:last-child{border-bottom:none}
.formula-row .fx{flex:none;min-width:150px;font-size:18px;color:var(--ink)}
.formula-row .desc{font-size:14.5px;color:var(--ink-dim)}
.formula-row .desc b{color:var(--accent);font-weight:600}

/* exam focus */
.exam{background:linear-gradient(135deg,rgba(240,150,78,.08),rgba(239,106,106,.05));border:1px solid rgba(240,150,78,.28)}
.exam h3 .dot{background:var(--orange);box-shadow:0 0 10px var(--orange)}
.exam .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.tag{font-family:'IBM Plex Mono';font-size:11px;background:rgba(240,150,78,.12);border:1px solid rgba(240,150,78,.3);color:#f6b483;padding:4px 10px;border-radius:20px}

/* worked example */
.worked{background:var(--panel2);border:1px solid var(--line2)}
.worked h3 .dot{background:var(--yellow);box-shadow:0 0 10px var(--yellow)}
.prob{font-style:italic;color:var(--ink);background:rgba(0,0,0,.2);border-left:3px solid var(--yellow);padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:14px}
.step{margin-bottom:12px}
.step .lbl{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em}
.answer{display:inline-block;background:rgba(95,208,138,.12);border:1px solid rgba(95,208,138,.4);color:var(--green);padding:5px 14px;border-radius:8px;font-family:'IBM Plex Mono';font-weight:500;margin-top:6px}
details.reveal{margin-top:10px}
details.reveal summary{cursor:pointer;color:var(--accent);font-family:'IBM Plex Mono';font-size:13px;list-style:none;user-select:none;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--line2);border-radius:8px;transition:.2s}
details.reveal summary:hover{border-color:var(--accent)}
details.reveal summary::-webkit-details-marker{display:none}
details.reveal summary::before{content:"▸";transition:.2s}
details.reveal[open] summary::before{transform:rotate(90deg)}
details.reveal[open] summary{margin-bottom:12px}

/* interactive viz */
.viz{background:var(--bg2);border:1px solid var(--line2)}
.viz h3 .dot{background:var(--indigo);box-shadow:0 0 10px var(--indigo)}
.viz canvas{width:100%;display:block;border-radius:10px;background:#070a10;border:1px solid var(--line)}
.controls{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:16px}
.ctrl{flex:1;min-width:180px}
.ctrl label{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-dim);margin-bottom:7px}
.ctrl label .v{color:var(--accent)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:4px;background:var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent);border:2px solid #0a0e14}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #0a0e14}
.readout{font-family:'IBM Plex Mono';font-size:13px;color:var(--ink-dim);margin-top:14px;padding:12px 14px;background:rgba(0,0,0,.25);border-radius:9px;border:1px solid var(--line)}
.readout b{color:var(--cyan)}

/* quiz */
.quiz{background:var(--panel)}
.quiz h3 .dot{background:var(--green);box-shadow:0 0 10px var(--green)}
.q{border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px;background:var(--bg2)}
.q .qtext{font-weight:500;color:var(--ink);margin-bottom:14px}
.q .qtext .qn{font-family:'IBM Plex Mono';color:var(--accent);margin-right:8px}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line2);color:var(--ink-dim);border-radius:9px;padding:11px 15px;margin-bottom:9px;cursor:pointer;font-family:'Spectral';font-size:15.5px;transition:.16s;position:relative}
.opt:hover{border-color:var(--accent);color:var(--ink)}
.opt.correct{background:rgba(95,208,138,.14);border-color:var(--green);color:#cdeed7}
.opt.wrong{background:rgba(239,106,106,.12);border-color:var(--red);color:#f3c4c4}
.opt.disabled{cursor:default;pointer-events:none}
.opt .mark{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono';font-weight:600}
.explain{font-size:14.5px;color:var(--ink-dim);margin-top:10px;padding:12px 15px;background:rgba(91,124,240,.08);border-left:3px solid var(--indigo);border-radius:0 8px 8px 0;display:none}
.explain.show{display:block}

/* study plan */
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.week-card{border:1px solid var(--line2);border-radius:12px;padding:14px 16px;background:var(--bg2);transition:.2s}
.week-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.week-card .wk{font-family:'IBM Plex Mono';font-size:11px;color:var(--accent);letter-spacing:.06em}
.week-card .wt{font-weight:500;margin-top:5px;font-size:15px;line-height:1.3}
.week-card .wd{font-size:13px;color:var(--ink-faint);margin-top:4px}

.footer{margin-top:70px;border-top:1px solid var(--line);padding-top:26px;color:var(--ink-faint);font-family:'IBM Plex Mono';font-size:12.5px;text-align:center;line-height:1.8}
.footer .grad{background:var(--spectrum);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:600}

.katex{font-size:1.05em}
.formula-row .katex{font-size:1.15em}

@media(max-width:980px){
  .layout{grid-template-columns:1fr;gap:0}
  .sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:var(--bg2);border-right:1px solid var(--line);z-index:60;transform:translateX(-100%);transition:.28s;padding:80px 16px 20px}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:block}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:55;display:none}
  .scrim.show{display:block}
  .progresswrap .lbl-txt{display:none}
}
@media(max-width:560px){
  body{font-size:16px}
  .hero{padding:30px 22px}
  .card{padding:20px 18px}
  .formula-row{flex-direction:column;align-items:flex-start;gap:6px}
  .formula-row .fx{min-width:0}
}
</style>
</head>

      <span class="lbl-txt">Fremgang</span>

<div class="scrim" id="scrim" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>
