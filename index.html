<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFY4195 Optikk — Interaktiv pensumguide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Spectral:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script>
try{
  const storedTheme=localStorage.getItem('tfy4195_theme_v1');
  if(storedTheme){ document.documentElement.dataset.theme=storedTheme; }
}catch(e){}
</script>
<style>
:root{
  --bg:#f5f7fa;
  --bg2:#edf1f5;
  --panel:#ffffff;
  --panel2:#f8fafc;
  --ink:#1e2835;
  --ink-dim:#526171;
  --ink-faint:#616c79;
  --line:#d9e0e8;
  --line2:#c4ccd7;
  --violet:#5f558f;
  --indigo:#1f5f8b;
  --cyan:#087d79;
  --green:#2f855a;
  --yellow:#9a6a00;
  --orange:#b45f06;
  --red:#b42318;
  --accent:var(--indigo);
  --accent-soft:#e8f1f6;
  --goals-bg:#f6fbfa;
  --exam-bg:#fff8f1;
  --exam-line:#e4c4a4;
  --answer-bg:#eff8f2;
  --answer-line:#b8d8c4;
  --wrong-bg:#fff1f0;
  --option-bg:#ffffff;
  --canvas-bg:#ffffff;
  --scrim:rgba(0,0,0,.6);
  --on-strong:#ffffff;
}
html[data-theme="dark"]{
  --bg:#11161d;
  --bg2:#171e27;
  --panel:#1d2530;
  --panel2:#242e3a;
  --ink:#f0eee8;
  --ink-dim:#c1c8d0;
  --ink-faint:#8d98a6;
  --line:#364151;
  --line2:#4a5667;
  --violet:#b6a7f0;
  --indigo:#8bb9d8;
  --cyan:#6bc7c3;
  --green:#79c79b;
  --yellow:#d7aa45;
  --orange:#e0a15f;
  --red:#e47770;
  --accent:var(--indigo);
  --accent-soft:#263746;
  --goals-bg:#172820;
  --exam-bg:#2b2118;
  --exam-line:#76512f;
  --answer-bg:#173023;
  --answer-line:#47765a;
  --wrong-bg:#331e1d;
  --option-bg:#171e27;
  --canvas-bg:#10151c;
  --scrim:rgba(0,0,0,.72);
  --on-strong:#10151c;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:'Spectral',Georgia,serif;font-weight:400;font-size:17px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.12;letter-spacing:0}
code,.mono,.num{font-family:'IBM Plex Mono',monospace}

/* visible keyboard focus on all interactive elements */
a:focus-visible,button:focus-visible,summary:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}

/* skip-to-content link (hidden until focused) */
.skip-link{position:fixed;left:-9999px;top:0;z-index:200;background:var(--accent);color:#fff;
  font-family:'IBM Plex Mono';font-size:13px;text-decoration:none;padding:10px 16px;border-radius:0 0 8px 0}
.skip-link:focus{left:0}

/* ====== top bar ====== */
.topbar{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 22px}
.brand{display:flex;align-items:center;gap:12px;font-family:'Fraunces';font-weight:600;font-size:18px;letter-spacing:0;white-space:nowrap}
.prism{width:30px;height:30px;flex:none;border-radius:6px;background:var(--panel);border:2px solid var(--accent);position:relative}
.prism::after{content:"";position:absolute;left:6px;right:6px;top:13px;border-top:2px solid var(--accent);transform:rotate(-28deg)}
.brand small{font-family:'IBM Plex Mono';font-weight:400;font-size:11px;color:var(--ink-faint);letter-spacing:0;text-transform:uppercase;display:block;margin-top:-2px}
.topbar .spacer{flex:1}
.progresswrap{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-dim)}
.progressbar{width:130px;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.progressfill{height:100%;width:0;background:var(--accent);transition:width .4s ease}
.btn-reset{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);background:transparent;border:1px solid var(--line2);border-radius:6px;padding:5px 9px;cursor:pointer;transition:.2s}
.btn-reset:hover{color:var(--ink);border-color:var(--accent)}
.btn-theme{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-dim);background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:5px 9px;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-theme:hover{color:var(--ink);border-color:var(--accent)}
.menu-toggle{display:none;background:transparent;border:1px solid var(--line2);color:var(--ink);border-radius:7px;padding:7px 10px;cursor:pointer;font-size:18px}

/* ====== layout ====== */
.layout{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:264px 1fr;gap:38px;padding:30px 22px 90px}
.sidebar{position:sticky;top:78px;height:calc(100vh - 100px);overflow-y:auto;padding-right:8px;scrollbar-width:thin}
.sidebar::-webkit-scrollbar{width:7px}.sidebar::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.nav-section{font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:0;color:var(--ink-faint);margin:22px 0 8px;padding-left:4px}
.nav-section:first-child{margin-top:0}
.nav-link{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:8px;color:var(--ink-dim);text-decoration:none;font-size:15px;font-family:'Spectral';transition:.16s;border:1px solid transparent;cursor:pointer}
.nav-link:hover{background:var(--panel);color:var(--ink)}
.nav-link.active{background:var(--panel2);color:var(--ink);border-color:var(--line2)}
.nav-num{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);width:26px;flex:none}
.nav-link.active .nav-num{color:var(--accent)}
.nav-check{margin-left:auto;width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line2);flex:none;display:grid;place-items:center;font-size:10px;color:transparent;transition:.2s}
.nav-link.done .nav-check{background:var(--green);border-color:var(--green);color:var(--on-strong)}

.content{min-width:0}

/* ====== hero ====== */
.hero{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:42px 40px;position:relative;overflow:hidden}
.hero::before{content:none}
.hero-tag{position:relative;font-family:'IBM Plex Mono';font-size:12px;letter-spacing:0;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.hero h1{position:relative;font-size:48px;margin:0 0 16px;font-weight:600;max-width:840px}
.hero h1 .accent-text{color:var(--accent)}
.hero p{position:relative;font-size:18px;color:var(--ink-dim);max-width:760px;margin:0 0 24px}
.hero-stats{position:relative;display:flex;flex-wrap:wrap;gap:12px}
.stat{border:1px solid var(--line2);border-radius:8px;padding:12px 18px;background:var(--panel2)}
.stat b{font-family:'Fraunces';font-size:24px;display:block}
.stat span{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-top:20px}
.module-tile{display:block;text-decoration:none;color:inherit;border:1px solid var(--line2);border-radius:8px;background:var(--panel);padding:15px 16px;transition:.16s}
.module-tile:hover{border-color:var(--accent);background:var(--panel2)}
.module-tile .tile-num{font-family:'IBM Plex Mono';font-size:11px;color:var(--accent)}
.module-tile .tile-title{font-weight:600;line-height:1.25;margin-top:5px}
.module-tile .tile-week{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);margin-top:7px}
.page-actions{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
.page-link{display:inline-flex;align-items:center;justify-content:center;min-height:38px;text-decoration:none;color:var(--accent);border:1px solid var(--line2);border-radius:8px;background:var(--panel);padding:8px 13px;font-family:'IBM Plex Mono';font-size:12px;cursor:pointer}
.page-link:hover{border-color:var(--accent);background:var(--panel2)}
.page-link.disabled{visibility:hidden}

/* ====== module sections ====== */
.module{margin-top:0}
.mod-head{display:flex;align-items:flex-start;gap:18px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
.mod-index{font-family:'Fraunces';font-size:42px;font-weight:600;line-height:1;color:var(--line2);flex:none;min-width:58px}
.mod-head .meta{flex:1}
.mod-kicker{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:0;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.mod-head h2{font-size:32px;margin:0 0 8px}
.mod-head .week{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint)}
.done-btn{flex:none;font-family:'IBM Plex Mono';font-size:12px;border:1px solid var(--line2);background:transparent;color:var(--ink-dim);border-radius:8px;padding:9px 14px;cursor:pointer;transition:.2s;white-space:nowrap}
.done-btn:hover{border-color:var(--green);color:var(--ink)}
.done-btn.done{background:var(--green);color:var(--on-strong);border-color:var(--green);font-weight:600}

.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:26px 28px;margin-bottom:20px}
.card h3{font-size:21px;margin:0 0 14px;display:flex;align-items:center;gap:10px}
.card h3 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
.card h4{font-size:16.5px;margin:20px 0 8px;color:var(--ink)}
.card p{margin:0 0 13px;color:var(--ink-dim)}
.card p strong,.card li strong{color:var(--ink);font-weight:600}
.card p a{color:var(--accent);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.backup-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.backup-label{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint)}
.backup-row .page-link{min-height:34px;padding:6px 12px;text-decoration:none}
.import-label{cursor:pointer}
.backup-msg{font-family:'IBM Plex Mono';font-size:12px;color:var(--green)}
.card ul,.card ol{margin:0 0 13px;padding-left:22px;color:var(--ink-dim)}
.card li{margin-bottom:7px}
.lede{font-size:18.5px;color:var(--ink)!important;border-left:3px solid var(--accent);padding-left:16px;margin-bottom:20px!important}
.method-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px 28px;border-top:1px solid var(--line);margin-top:18px;padding-top:18px}
.method-grid h4{margin:0 0 6px}
.method-grid p{margin:0;color:var(--ink-dim)}
.concept{background:var(--panel2)}
.concept h3 .dot{background:var(--accent)}
.practice-note{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-top:-4px;margin-bottom:14px}

/* learning goals */
.goals{background:var(--goals-bg);border:1px solid var(--line2)}
.goals h3 .dot{background:var(--cyan)}
.goals ul{list-style:none;padding-left:0}
.goals li{position:relative;padding-left:26px}
.goals li::before{content:"";position:absolute;left:0;top:12px;width:7px;height:7px;border-radius:50%;background:var(--cyan)}

/* formula box */
.formula-box{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:6px 18px 4px;margin:14px 0}
.formula-row{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px dashed var(--line)}
.formula-row:last-child{border-bottom:none}
.formula-row .fx{flex:none;min-width:150px;font-size:18px;color:var(--ink)}
.formula-row .desc{font-size:14.5px;color:var(--ink-dim)}
.formula-row .desc b{color:var(--accent);font-weight:600}
/* formel som IKKE er på formelarket – må pugges */
.formula-row.offsheet{border-left:3px solid var(--orange);padding-left:11px;border-radius:0 6px 6px 0}
.pugg{display:inline-block;margin-left:8px;font-family:'IBM Plex Mono';font-size:10px;font-weight:600;letter-spacing:.02em;color:var(--orange);border:1px solid var(--orange);border-radius:5px;padding:1px 6px;white-space:nowrap;vertical-align:middle}
/* kompakt tabell (fortegn / matrisetolkning) */
.ftable{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
.ftable th,.ftable td{border:1px solid var(--line);padding:7px 11px;text-align:left;vertical-align:top}
.ftable th{background:var(--panel2);color:var(--ink);font-weight:600;font-size:12.5px}
.ftable td{color:var(--ink-dim)}
.ftable td:first-child{color:var(--ink);white-space:nowrap}

/* exam focus */
.exam{background:var(--exam-bg);border:1px solid var(--exam-line)}
.exam h3 .dot{background:var(--orange)}
.exam .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.tag{font-family:'IBM Plex Mono';font-size:11px;background:var(--option-bg);border:1px solid var(--exam-line);color:var(--orange);padding:4px 10px;border-radius:999px}

/* worked example */
.worked{background:var(--panel2);border:1px solid var(--line2)}
.worked h3 .dot{background:var(--yellow)}
.prob{font-style:italic;color:var(--ink);background:var(--option-bg);border-left:3px solid var(--yellow);padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:14px}
.step{margin-bottom:12px}
.step .lbl{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0}
.answer{display:inline-block;background:var(--answer-bg);border:1px solid var(--answer-line);color:var(--green);padding:5px 14px;border-radius:8px;font-family:'IBM Plex Mono';font-weight:500;margin-top:6px}
details.reveal{margin-top:10px}
details.reveal summary{cursor:pointer;color:var(--accent);font-family:'IBM Plex Mono';font-size:13px;list-style:none;-webkit-user-select:none;user-select:none;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--line2);border-radius:8px;transition:.2s}
details.reveal summary:hover{border-color:var(--accent)}
details.reveal summary::-webkit-details-marker{display:none}
details.reveal summary::before{content:"▸";transition:.2s}
details.reveal[open] summary::before{transform:rotate(90deg)}
details.reveal[open] summary{margin-bottom:12px}

/* interactive viz */
.viz{background:var(--bg2);border:1px solid var(--line2)}
.viz h3 .dot{background:var(--indigo)}
.viz canvas{width:100%;display:block;border-radius:8px;background:var(--canvas-bg);border:1px solid var(--line)}
.controls{display:flex;flex-wrap:wrap;gap:18px 26px;margin-top:16px}
.ctrl{flex:1;min-width:180px}
.ctrl label{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-dim);margin-bottom:7px}
.ctrl label .v{color:var(--accent)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:4px;background:var(--line2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
.readout{font-family:'IBM Plex Mono';font-size:13px;color:var(--ink-dim);margin-top:14px;padding:12px 14px;background:var(--panel);border-radius:8px;border:1px solid var(--line)}
.readout b{color:var(--accent)}

/* quiz */
.quiz{background:var(--panel)}
.quiz h3 .dot{background:var(--green)}
.q{border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:14px;background:var(--panel2)}
.q .qtext{font-weight:500;color:var(--ink);margin-bottom:14px}
.q .qtext .qn{font-family:'IBM Plex Mono';color:var(--accent);margin-right:8px}
.opt{display:block;width:100%;text-align:left;background:var(--option-bg);border:1px solid var(--line2);color:var(--ink-dim);border-radius:8px;padding:11px 15px;margin-bottom:9px;cursor:pointer;font-family:'Spectral';font-size:15.5px;transition:.16s;position:relative}
.opt:hover{border-color:var(--accent);color:var(--ink)}
.opt.correct{background:var(--answer-bg);border-color:var(--green);color:var(--green)}
.opt.wrong{background:var(--wrong-bg);border-color:var(--red);color:var(--red)}
.opt.disabled{cursor:default;pointer-events:none}
.opt .mark{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono';font-weight:600}
.explain{font-size:14.5px;color:var(--ink-dim);margin-top:10px;padding:12px 15px;background:var(--accent-soft);border-left:3px solid var(--indigo);border-radius:0 8px 8px 0;display:none}
.explain.show{display:block}

/* study plan */
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.week-card{border:1px solid var(--line2);border-radius:8px;padding:14px 16px;background:var(--panel);transition:.2s}
.week-card:hover{border-color:var(--accent)}
.week-card .wk{font-family:'IBM Plex Mono';font-size:11px;color:var(--accent);letter-spacing:0}
.week-card .wt{font-weight:500;margin-top:5px;font-size:15px;line-height:1.3}
.week-card .wd{font-size:13px;color:var(--ink-faint);margin-top:4px}

.footer{margin-top:70px;border-top:1px solid var(--line);padding-top:26px;color:var(--ink-faint);font-family:'IBM Plex Mono';font-size:12.5px;text-align:center;line-height:1.8}
.footer .accent-text{color:var(--accent);font-weight:600}

.katex{font-size:1.05em}
.formula-row .katex{font-size:1.15em}

/* ====== formelark (verktøy) ====== */
.fs-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:6px}
.fs-search{flex:1;min-width:220px;font-family:'Spectral';font-size:15px;color:var(--ink);background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:10px 14px}
.fs-search::placeholder{color:var(--ink-faint)}
.fs-filters{display:flex;flex-wrap:wrap;gap:8px}
.fs-chip{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-dim);background:var(--panel2);border:1px solid var(--line2);border-radius:999px;padding:7px 14px;cursor:pointer;transition:.16s}
.fs-chip:hover{border-color:var(--accent);color:var(--ink)}
.fs-chip.active{background:var(--accent);border-color:var(--accent);color:var(--on-strong)}
.fs-group{font-size:15px;margin:22px 0 8px;display:flex;align-items:center;gap:10px;color:var(--ink)}
.fs-group:first-child{margin-top:10px}
.fs-group .nav-num{color:var(--accent);width:auto}
.fs-empty{color:var(--ink-faint);font-family:'IBM Plex Mono';font-size:13px;padding:10px 0}

/* ====== flashcards (verktøy) ====== */
.fc-host{margin-top:18px}
.fc-progress{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-bottom:10px}
.fc-card{position:relative;border:1px solid var(--line2);border-radius:10px;background:var(--panel2);padding:30px 26px;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:14px}
.fc-badge{position:absolute;top:10px;right:12px;font-family:'IBM Plex Mono';font-size:10px;font-weight:600;color:var(--orange);border:1px solid var(--orange);border-radius:5px;padding:2px 7px}
.fc-side{font-size:18px;line-height:1.5}
.fc-front{color:var(--ink)}
.fc-back{color:var(--ink)}
.fc-back .katex{font-size:1.3em}
.fc-divider{border-top:1px dashed var(--line2)}
.fc-ex{font-size:14.5px;color:var(--ink-dim);margin-top:10px}
.fc-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.fc-actions .page-link{min-height:44px;padding:10px 18px;cursor:pointer}
.fc-known{color:var(--green);border-color:var(--answer-line)}
.fc-done{text-align:center;padding:24px 10px}
.fc-tally{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-bottom:10px}
.fc-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.fc-nav .page-link{min-height:40px;cursor:pointer}
.fc-nav .page-link[disabled]{opacity:.4;pointer-events:none}

/* ====== steg-for-steg strålegang ====== */
.rg-scenarios{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.rg-steptext{margin-top:14px;padding:12px 16px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;color:var(--ink);font-size:15.5px;min-height:24px}
.rg-controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:14px}
.rg-controls .page-link{min-height:40px;cursor:pointer}
.rg-count{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin:0 4px}
#rgPrev[disabled],#rgNext[disabled]{opacity:.4;pointer-events:none}

/* ====== søk / kommandopalett ====== */
.cmdk{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center}
.cmdk[hidden]{display:none}
.cmdk-backdrop{position:absolute;inset:0;background:var(--scrim)}
.cmdk-panel{position:relative;margin-top:11vh;width:min(640px,92vw);background:var(--panel);border:1px solid var(--line2);border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden}
.cmdk-input{width:100%;border:0;border-bottom:1px solid var(--line);background:var(--panel);color:var(--ink);font-family:'Spectral';font-size:17px;padding:16px 18px;outline:none}
.cmdk-input::placeholder{color:var(--ink-faint)}
.cmdk-results{list-style:none;margin:0;padding:6px;max-height:54vh;overflow-y:auto}
.cmdk-item{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 12px;border-radius:8px;cursor:pointer}
.cmdk-item:hover,.cmdk-item.sel{background:var(--panel2)}
.cmdk-label{color:var(--ink);font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-sub{flex:none;font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);white-space:nowrap}
.cmdk-empty{padding:14px 12px;color:var(--ink-faint);font-family:'IBM Plex Mono';font-size:13px}

/* ====== utskrift ====== */
@media print{
  .topbar,.sidebar,.scrim,.menu-toggle,.skip-link,.footer,.page-actions,.fs-controls,.fc-decks,.fc-actions,.fc-progress,.cmdk,.backup-row,.done-btn{display:none!important}
  .layout{display:block;max-width:none;padding:0;gap:0}
  .content{min-width:0}
  body{font-size:11pt;background:#fff;color:#000}
  .card,.formula-box,.hero,.fc-card{break-inside:avoid;box-shadow:none}
  a{color:#000;text-decoration:none}
}

@media(max-width:980px){
  .layout{grid-template-columns:1fr;gap:0}
  .sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:var(--panel);border-right:1px solid var(--line);z-index:60;transform:translateX(-100%);transition:.28s;padding:80px 16px 20px}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:block}
  .scrim{position:fixed;inset:0;background:var(--scrim);z-index:55;display:none}
  .scrim.show{display:block}
  .progresswrap .lbl-txt{display:none}
}
/* comfortable touch targets on smaller / touch screens */
@media(max-width:980px){
  .nav-link{padding:11px 12px}
  .opt{min-height:44px}
  .btn-theme,.btn-reset{min-height:36px}
}

/* respect reduced-motion preference */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;animation-iteration-count:1!important;
    transition-duration:.01ms!important;scroll-behavior:auto!important
  }
}

@media(max-width:560px){
  body{font-size:16px}
  .brand small{display:none}
  .topbar-inner{gap:10px}
  .brand{font-size:16px}
  .topbar .spacer{display:none}
  .progressbar{display:none}
  .btn-theme{padding:5px 7px}
  .btn-reset{display:none}
  .hero h1{font-size:32px}
  .mod-head{display:block}
  .mod-index{font-size:34px;margin-bottom:10px}
  .mod-head h2{font-size:26px}
  .done-btn{margin-top:14px}
  .hero{padding:30px 22px}
  .card{padding:20px 18px}
  .method-grid{grid-template-columns:1fr}
  .formula-row{flex-direction:column;align-items:flex-start;gap:6px}
  .formula-row .fx{min-width:0}
}
</style>
